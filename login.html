<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Havish Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, OAuthProvider, GithubAuthProvider, signInWithPopup,
            createUserWithEmailAndPassword, signInWithEmailAndPassword,
            onAuthStateChanged, signOut }
            from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

            const firebaseConfig = {
    apiKey: "AIzaSyAduFJpr2K53fztrdaHpCWULXRHxCqtP-E",
    authDomain: "havish-studio.firebaseapp.com",
    projectId: "havish-studio",
    storageBucket: "havish-studio.firebasestorage.app",
    messagingSenderId: "139675406404",
    appId: "1:139675406404:web:ca317c2918943f0b5dec11",
    measurementId: "G-KNS8JQHTZ4"
  };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        const appleProvider = new OAuthProvider('apple.com');
        const githubProvider = new GithubAuthProvider();

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }

        function setLoading(button, isLoading) {
            if (isLoading) {
                button.disabled = true;
                button.dataset.originalText = button.textContent;
                button.innerHTML = '<span class="spinner"></span> Loading...';
            } else {
                button.disabled = false;
                button.textContent = button.dataset.originalText;
            }
        }

        document.getElementById("googleLogin").addEventListener("click", async (e) => {
            const btn = e.currentTarget;
            setLoading(btn, true);
            try {
                await signInWithPopup(auth, googleProvider);
                window.location.href = "index.html";
            } catch (error) {
                showError(error.message);
                setLoading(btn, false);
            }
        });

        document.getElementById("appleLogin").addEventListener("click", async (e) => {
            const btn = e.currentTarget;
            setLoading(btn, true);
            try {
                await signInWithPopup(auth, appleProvider);
                window.location.href = "index.html";
            } catch (error) {
                showError(error.message);
                setLoading(btn, false);
            }
        });

        document.getElementById("githubLogin").addEventListener("click", async (e) => {
            const btn = e.currentTarget;
            setLoading(btn, true);
            try {
                await signInWithPopup(auth, githubProvider);
                window.location.href = "index.html";
            } catch (error) {
                showError(error.message);
                setLoading(btn, false);
            }
        });

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            setLoading(btn, true);
            const email = e.target.email.value;
            const password = e.target.password.value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "index.html";
            } catch (error) {
                showError(error.message);
                setLoading(btn, false);
            }
        });

        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            setLoading(btn, true);
            const email = e.target.email.value;
            const password = e.target.password.value;
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                window.location.href = "index.html";
            } catch (error) {
                showError(error.message);
                setLoading(btn, false);
            }
        });

        document.getElementById("logoutBtn").addEventListener("click", async (e) => {
            const btn = e.currentTarget;
            setLoading(btn, true);
            try {
                await signOut(auth);
                window.location.href = "login.html";
            } catch (error) {
                showError(error.message);
                setLoading(btn, false);
            }
        });

        document.getElementById("showSignup").addEventListener("click", (e) => {
            e.preventDefault();
            document.getElementById("loginView").style.display = "none";
            document.getElementById("signupView").style.display = "block";
        });

        document.getElementById("showLogin").addEventListener("click", (e) => {
            e.preventDefault();
            document.getElementById("signupView").style.display = "none";
            document.getElementById("loginView").style.display = "block";
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("authContainer").style.display = "none";
                document.getElementById("loggedInView").style.display = "block";
                document.getElementById("userName").textContent = user.displayName || user.email;
            }
        });
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at 20% 50%, #1a1a2e 0%, #16213e 50%, #0f1419 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .background {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .line-flow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(0,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(0,255,255,0.03) 75%);
            background-size: 400% 100%;
            animation: flowLine 8s linear infinite;
        }

        @keyframes flowLine {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 255, 225, 0.3);
            border-radius: 50%;
            animation: float-particle 20s infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 1s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 3s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 4.5s; }

        @keyframes float-particle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 255, 225, 0.2);
            border-radius: 30px;
            padding: 50px 45px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 60px rgba(0, 255, 225, 0.2), inset 0 0 40px rgba(0, 255, 225, 0.03);
            position: relative;
            z-index: 1;
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 900;
            color: #00ffe1;
            text-shadow: 0 0 20px rgba(0, 255, 225, 0.6), 0 0 40px rgba(0, 255, 225, 0.3);
            margin-bottom: 10px;
            letter-spacing: 2px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(0, 255, 225, 0.6), 0 0 40px rgba(0, 255, 225, 0.3); }
            to { text-shadow: 0 0 30px rgba(0, 255, 225, 0.8), 0 0 60px rgba(0, 255, 225, 0.5); }
        }

        .logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 400;
        }

        #errorMessage {
            display: none;
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid rgba(255, 68, 68, 0.5);
            color: #ff6b6b;
            padding: 15px 18px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 13px;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .form-group {
            margin-bottom: 25px;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #00ffe1;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(0, 255, 225, 0.3);
            border-radius: 15px;
            font-size: 15px;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        input:focus {
            outline: none;
            border-color: #00ffe1;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 255, 225, 0.3);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ffe1 0%, #00b8a9 100%);
            color: #0f1419;
            margin-top: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 225, 0.3);
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 255, 225, 0.5);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn-social {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 2px solid rgba(0, 255, 225, 0.3);
            margin-top: 12px;
            animation: fadeIn 1s ease-out calc(0.6s + var(--delay)) both;
        }

        .btn-social:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00ffe1;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 225, 0.2);
        }

        #googleLogin { --delay: 0s; }
        #appleLogin { --delay: 0.1s; }
        #githubLogin { --delay: 0.2s; }

        .btn-social svg {
            width: 22px;
            height: 22px;
            position: relative;
            z-index: 1;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 35px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            animation: fadeIn 1s ease-out 0.7s both;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(0, 255, 225, 0.2);
        }

        .divider span {
            padding: 0 20px;
        }

        .link-text {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            animation: fadeIn 1s ease-out 0.9s both;
        }

        .link-text a {
            color: #00ffe1;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(0, 255, 225, 0.3);
        }

        .link-text a:hover {
            color: #00fff2;
            text-shadow: 0 0 20px rgba(0, 255, 225, 0.6);
        }

        #signupView {
            display: none;
        }

        #loggedInView {
            display: none;
            text-align: center;
        }

        .user-info {
            background: rgba(0, 255, 225, 0.05);
            border: 2px solid rgba(0, 255, 225, 0.3);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .user-info h3 {
            color: #00ffe1;
            margin-bottom: 10px;
            font-size: 22px;
            text-shadow: 0 0 15px rgba(0, 255, 225, 0.5);
        }

        .user-info p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .btn-logout {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        }

        .btn-logout:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(255, 107, 107, 0.5);
        }

        @media (max-width: 480px) {
            .container {
                padding: 35px 28px;
            }

            .logo h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
<div class="background">
    <div class="line-flow"></div>
    <div class="floating-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
</div>

<div class="container">
    <div class="logo">
        <h1>HAVISH PROJECTS</h1>
        <p>Welcome back! Please login to your account.</p>
    </div>

    <div id="errorMessage"></div>

    <div id="authContainer">
        <!-- Login View -->
        <div id="loginView">
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" name="email" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <div class="divider"><span>OR CONTINUE WITH</span></div>

            <button id="googleLogin" class="btn btn-social">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>

            <button id="appleLogin" class="btn btn-social">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="currentColor"/>
                </svg>
                Apple
            </button>

            <button id="githubLogin" class="btn btn-social">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z" fill="currentColor"/>
                </svg>
                GitHub
            </button>

            <div class="link-text">
                Don't have an account? <a href="#" id="showSignup">Sign up</a>
            </div>
        </div>

        <!-- Signup View -->
        <div id="signupView">
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" name="email" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" name="password" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>

            <div class="link-text">
                Already have an account? <a href="#" id="showLogin">Sign in</a>
            </div>
        </div>
    </div>

    <!-- Logged In View -->
    <div id="loggedInView">
        <div class="user-info">
            <h3>Welcome back!</h3>
            <p id="userName"></p>
        </div>
        <button id="logoutBtn" class="btn btn-logout">Sign Out</button>
    </div>
</div>
</body>
</html>
