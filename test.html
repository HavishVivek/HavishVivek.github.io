<!DOCTYPE html>
<html>
<head>
    <title>Open New Page</title>
</head>
<body>
    <button id="openPageButton">Build</button>

    <script>
        document.getElementById("openPageButton").addEventListener("click", function() {
            // Open a new page when the button is clicked
            window.open("https://www.example.com", "_blank");
        });
    </script>
</body>
</html>
