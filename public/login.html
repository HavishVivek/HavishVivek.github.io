<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <link rel="stylesheet" href="css/NavBar.css" />
    <div class="navbar">
      <div class="dropdown">
        <button class="dropbtn">
          Home
          <i class="fa fa-caret-down"></i>
        </button>
        <div class="dropdown-content">
          <a href="index.html">Home</a>
          <a href="basics/Github.html">Reference</a>
        </div>
      </div>
      <div class="dropdown">
        <button class="dropbtn">
          Electronics
          <i class="fa fa-caret-down"></i>
        </button>
        <div class="dropdown-content">
          <a href="basics/arduino.html">Arduino</a>
          <a href="basics/raspberry.html">Raspberrypi</a>
        </div>
      </div>
      <div class="dropdown">
        <button class="dropbtn">
          MechineLearning
          <i class="fa fa-caret-down"></i>
        </button>
        <div class="dropdown-content">
          <a href="basics/Tenserflow.html">CameraDetection</a>
        </div>
      </div>
      <div class="dropdown">
        <button class="dropbtn">
          register
          <i class="fa fa-caret-down"></i>
        </button>
        <div class="dropdown-content">
          <a href="/register">register</a>
        </div>
      </div>
    </div>
    <div class="container my-5">
      <div class="card" style="width: 100%">
        <div class="card-body">
          <h5 class="card-title">login form</h5>
          <form onsubmit="return false;" id="form">
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" autocomplete="off" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                autocomplete="off" required
              />
            </div>
            <div class="alert alert-danger" role="alert" id="error" style="display: none;"></div>
            <div class="alert alert-success" role="alert" id="success" style="display: none;"></div>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
        </div>
      </div>
    </div>
    </body>
    <script src="js/login.js">

    </script>
  </body>
</html>
