<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Models</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.3/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <nav class="bg-indigo-600 p-4">
        <div class="max-w-7xl mx-auto flex justify-between">
            <a href="/" class="text-white font-semibold text-2xl">Home</a>
            <div class="space-x-4">
                <a href="/ai-models" class="text-white">AI Models</a>
                <a href="/ml-models" class="text-white">ML Models</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-8">
        <h1 class="text-3xl font-bold text-center mb-6">Test the Arduino Due Detection Model</h1>
        
        {% if result %}
            <p class="text-xl text-gray-700 mb-4 text-center">{{ result }}</p>
            {% if image_url %}
                <img src="{{ image_url }}" alt="Uploaded Image with Bounding Box" class="rounded-lg shadow-xl mx-auto max-h-96 mb-6">
            {% endif %}
            <a href="/ai-models" class="w-full block bg-indigo-600 text-white py-3 rounded-lg text-center transform transition duration-200 hover:bg-indigo-700 hover:scale-105">
                Try Another Image
            </a>
        {% else %}
            <form action="/ai-models" method="POST" enctype="multipart/form-data" class="space-y-6">
                <div class="border-2 border-dashed border-indigo-600 p-6 text-center cursor-pointer hover:border-indigo-700 hover:bg-indigo-50">
                    <label for="file-upload" class="block text-xl text-indigo-700 font-semibold">Drag and drop or click to upload an image</label>
                    <input type="file" name="image" id="file-upload" class="hidden" accept="image/*">
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg transform transition duration-200 hover:bg-indigo-700 hover:scale-105">
                    Detect Arduino Due
                </button>
            </form>
        {% endif %}
    </div>
</body>
</html>
